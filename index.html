<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake News Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #667eea;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .real {
      color: green;
    }

    .fake {
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📰 Fake News Detector</h1>
    <p>Check if a news article is real or fake using AI</p>

    <textarea id="newsInput" placeholder="Paste your news here..."></textarea>

    <button onclick="checkNews()">Check News</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function checkNews() {
      const text = document.getElementById("newsInput").value;
      const result = document.getElementById("result");

      if (text.trim() === "") {
        result.innerHTML = "⚠️ Please enter some news text";
        result.className = "result";
        return;
      }

      result.innerHTML = "⏳ Checking...";
      result.className = "result";

      setTimeout(() => {
        const isFake = Math.random() > 0.5;

        if (isFake) {
          result.innerHTML = "❌ Fake News";
          result.className = "result fake";
        } else {
          result.innerHTML = "✅ Real News";
          result.className = "result real";
        }
      }, 1500);
    }
  </script>

</body>
</html>
